name: Strava Auto Kudos

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily — edit to your preferred time
  workflow_dispatch:       # also available via "Run workflow" button in Actions UI

jobs:
  auto-kudos:
    name: Give Kudos
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Auto Kudos
        env:
          STRAVA_EMAIL:    ${{ secrets.STRAVA_EMAIL }}
          STRAVA_PASSWORD: ${{ secrets.STRAVA_PASSWORD }}
        run: python auto_kudos.py
